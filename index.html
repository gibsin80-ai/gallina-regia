<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>La Gallina Regia</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #FFFBF2;
  --surface: #FFFFFF;
  --surface2: #FFF7E6;
  --border: #E8DCC8;
  --border-strong: #C8B898;
  --text: #1C1410;
  --text-muted: #7A6A55;
  --text-faint: #B8A888;
  --accent: #C8420A;
  --accent2: #E8A020;
  --accent-bg: #FFF0E8;
  --success: #4A7C2F;
  --success-bg: #EEF5E8;
  --danger: #C02020;
  --danger-bg: #FFF0F0;
  --info: #1060A0;
  --info-bg: #EFF5FF;
  --radius: 14px;
  --radius-sm: 8px;
  --shadow: 0 2px 12px rgba(28,20,16,0.08);
  --shadow-lg: 0 8px 32px rgba(28,20,16,0.14);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);min-height:100vh;color:var(--text);overflow-x:hidden;}

/* ── SPLASH ── */
#splash{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.5rem;background:var(--bg);}
.splash-egg{font-size:64px;margin-bottom:1rem;animation:bob 3s ease-in-out infinite;}
@keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.splash-brand{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:var(--text);text-align:center;line-height:1.2;}
.splash-brand span{color:var(--accent);}
.splash-tagline{font-size:13px;color:var(--text-muted);margin-top:6px;margin-bottom:2.5rem;text-align:center;letter-spacing:0.04em;}
.splash-label{font-size:11px;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:12px;text-align:center;}
.role-cards{display:flex;flex-direction:column;gap:10px;width:100%;max-width:320px;}
.role-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:16px 18px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:14px;}
.role-card:hover{border-color:var(--accent);box-shadow:var(--shadow);}
.role-card .rc-icon{font-size:28px;flex-shrink:0;}
.role-card .rc-title{font-weight:600;font-size:15px;color:var(--text);}
.role-card .rc-sub{font-size:12px;color:var(--text-muted);}
.pwd-wrap{margin-top:14px;width:100%;max-width:320px;display:none;}
.pwd-wrap input{width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:15px;font-family:inherit;background:var(--surface);color:var(--text);outline:none;transition:border .2s;}
.pwd-wrap input:focus{border-color:var(--accent);}
.pwd-wrap button{margin-top:8px;width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-size:15px;font-family:inherit;font-weight:600;cursor:pointer;transition:opacity .2s;}
.pwd-wrap button:hover{opacity:.88;}
.pwd-error{font-size:12px;color:var(--danger);margin-top:6px;display:none;}

/* ── APP SHELL ── */
#app{display:none;min-height:100vh;flex-direction:column;}
.topbar{background:var(--surface);border-bottom:1.5px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.topbar-left{display:flex;align-items:center;gap:10px;}
.topbar-brand{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:var(--text);}
.topbar-brand span{color:var(--accent);}
.topbar-role{font-size:11px;background:var(--accent-bg);color:var(--accent);border-radius:20px;padding:2px 10px;font-weight:600;}
.topbar-right{display:flex;gap:8px;align-items:center;}
.icon-btn{background:none;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:7px 10px;cursor:pointer;font-size:16px;color:var(--text-muted);transition:all .2s;display:flex;align-items:center;}
.icon-btn:hover{border-color:var(--accent);color:var(--accent);}

/* NAVBAR */
.navbar{background:var(--surface);border-top:1.5px solid var(--border);display:flex;position:fixed;bottom:0;left:0;right:0;z-index:100;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px 8px;cursor:pointer;border:none;background:none;color:var(--text-muted);font-family:inherit;font-size:10px;font-weight:500;transition:color .2s;border-top:2.5px solid transparent;}
.nav-item.active{color:var(--accent);border-top-color:var(--accent);}
.nav-icon{font-size:20px;}

/* CONTENT */
.content{flex:1;padding:16px;padding-bottom:80px;max-width:520px;margin:0 auto;width:100%;}

/* CARDS */
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow);}
.card-title{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.card-title .ct-icon{font-size:20px;}

/* DASHBOARD */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.stat-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);}
.stat-label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px;}
.stat-value{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:var(--text);line-height:1;}
.stat-sub{font-size:11px;color:var(--text-faint);margin-top:2px;}
.stat-card.accent{background:var(--accent);border-color:var(--accent);}
.stat-card.accent .stat-label,.stat-card.accent .stat-sub{color:rgba(255,255,255,0.75);}
.stat-card.accent .stat-value{color:#fff;}
.stat-card.success{background:var(--success-bg);border-color:#B8D8A8;}
.stat-card.success .stat-value{color:var(--success);}

/* FORMS */
.form-group{margin-bottom:14px;}
.form-label{font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;display:block;}
.form-input,.form-select,.form-textarea{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:15px;font-family:inherit;background:var(--surface);color:var(--text);outline:none;transition:border .2s;appearance:none;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent);}
.form-textarea{resize:vertical;min-height:70px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.form-hint{font-size:11px;color:var(--text-faint);margin-top:4px;}
.calc-box{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:14px;}
.calc-row{display:flex;justify-content:space-between;font-size:13px;color:var(--text-muted);margin-bottom:4px;}
.calc-row.total{font-size:16px;font-weight:700;color:var(--text);border-top:1px solid var(--border);padding-top:8px;margin-top:4px;}
.btn{width:100%;padding:14px;border:none;border-radius:var(--radius-sm);font-size:16px;font-family:inherit;font-weight:600;cursor:pointer;transition:all .2s;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{opacity:.9;}
.btn-secondary{background:var(--surface);border:1.5px solid var(--border);color:var(--text);}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent);}
.btn-success{background:var(--success);color:#fff;}
.btn + .btn{margin-top:8px;}

/* LISTS */
.list-item{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:8px;box-shadow:var(--shadow);}
.li-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
.li-title{font-weight:600;font-size:15px;color:var(--text);}
.li-amount{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:var(--accent);}
.li-amount.green{color:var(--success);}
.li-amount.red{color:var(--danger);}
.li-meta{font-size:12px;color:var(--text-muted);display:flex;gap:12px;flex-wrap:wrap;}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;}
.badge-orange{background:var(--accent-bg);color:var(--accent);}
.badge-green{background:var(--success-bg);color:var(--success);}
.badge-yellow{background:#FFF8E0;color:#9A6F00;}
.badge-gray{background:#F0EDE8;color:var(--text-muted);}

/* SECTION HEADER */
.sec-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.sec-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--text);}
.sec-btn{background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);padding:8px 14px;font-size:13px;font-family:inherit;font-weight:600;cursor:pointer;}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:12px;}
.search-wrap input{width:100%;padding:11px 14px 11px 38px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-family:inherit;background:var(--surface);color:var(--text);outline:none;transition:border .2s;}
.search-wrap input:focus{border-color:var(--accent);}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-faint);font-size:16px;}

/* TABS */
.tabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px;}
.tab{padding:7px 16px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--text-muted);white-space:nowrap;transition:all .2s;}
.tab.active{background:var(--accent);border-color:var(--accent);color:#fff;}

/* MODAL */
#modal-overlay{position:fixed;inset:0;background:rgba(28,20,16,.45);z-index:200;display:none;align-items:flex-end;justify-content:center;}
#modal-overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;padding:20px 20px 32px;}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px;}
.modal-title{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;margin-bottom:16px;}
.modal-actions{display:flex;gap:8px;margin-top:4px;}
.modal-actions .btn{flex:1;}

/* TOAST */
#toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:10px 20px;border-radius:var(--radius-sm);font-size:14px;font-weight:500;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}

/* TICKET */
.ticket{background:var(--surface);border:2px dashed var(--border);border-radius:var(--radius);padding:20px;margin-top:16px;}
.ticket-header{text-align:center;margin-bottom:14px;border-bottom:1px dashed var(--border);padding-bottom:12px;}
.ticket-brand{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--accent);}
.ticket-sub{font-size:12px;color:var(--text-muted);margin-top:2px;}
.ticket-row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;}
.ticket-row.bold{font-weight:700;font-size:15px;border-top:1px solid var(--border);padding-top:8px;margin-top:4px;}
.ticket-footer{text-align:center;margin-top:12px;padding-top:10px;border-top:1px dashed var(--border);font-size:12px;color:var(--text-muted);}

/* EMPTY */
.empty{text-align:center;padding:40px 20px;color:var(--text-faint);}
.empty-icon{font-size:40px;margin-bottom:8px;}
.empty-text{font-size:14px;}

/* PERIOD PILLS */
.period-wrap{display:flex;gap:6px;margin-bottom:14px;}
.period-pill{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--text-muted);transition:all .2s;}
.period-pill.active{background:var(--accent2);border-color:var(--accent2);color:#fff;}

/* CLIENT DETAIL */
.client-hist-item{padding:10px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.client-hist-item:last-child{border-bottom:none;}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-egg">🐔</div>
  <div class="splash-brand">La Gallina <span>Regia</span></div>
  <div class="splash-tagline">Sistema de gestión de huevo</div>
  <div class="splash-label">¿Cómo quieres entrar?</div>
  <div class="role-cards">
    <div class="role-card" onclick="selectRole('admin')">
      <div class="rc-icon">👑</div>
      <div>
        <div class="rc-title">Administrador</div>
        <div class="rc-sub">Acceso completo · entradas, gastos, reportes</div>
      </div>
    </div>
    <div class="role-card" onclick="selectRole('vendedor')">
      <div class="rc-icon">🧾</div>
      <div>
        <div class="rc-title">Vendedor</div>
        <div class="rc-sub">Registrar ventas y consultar clientes</div>
      </div>
    </div>
  </div>
  <div class="pwd-wrap" id="pwd-wrap">
    <input type="password" id="pwd-input" placeholder="Contraseña de administrador" onkeydown="if(event.key==='Enter')chkPwd()"/>
    <button onclick="chkPwd()">Entrar</button>
    <div class="pwd-error" id="pwd-error">Contraseña incorrecta</div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;flex-direction:column;min-height:100vh;">
  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-brand">La <span>Gallina</span></div>
      <div class="topbar-role" id="role-badge">Admin</div>
    </div>
    <div class="topbar-right">
      <button class="icon-btn" onclick="logout()" title="Salir">🚪</button>
    </div>
  </div>

  <!-- CONTENT AREA -->
  <div class="content" id="main-content"></div>

  <!-- NAVBAR -->
  <div class="navbar" id="navbar">
    <button class="nav-item active" onclick="navTo('dashboard',this)">
      <span class="nav-icon">📊</span>Dashboard
    </button>
    <button class="nav-item" onclick="navTo('ventas',this)">
      <span class="nav-icon">🥚</span>Ventas
    </button>
    <button class="nav-item nav-entradas" onclick="navTo('entradas',this)">
      <span class="nav-icon">📦</span>Entradas
    </button>
    <button class="nav-item nav-gastos" onclick="navTo('gastos',this)">
      <span class="nav-icon">💸</span>Gastos
    </button>
    <button class="nav-item" onclick="navTo('clientes',this)">
      <span class="nav-icon">👥</span>Clientes
    </button>
  </div>
</div>

<!-- MODAL -->
<div id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-box">
    <div class="modal-handle"></div>
    <div id="modal-content"></div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────
const ADMIN_PWD = '1234'; // CAMBIA ESTO
let SHEETS_URL = 'https://script.google.com/macros/s/AKfycbz5WVEEizQJF8wBsKGirWbTdte4lGwB6bjBM5sbtT0Gv_4CIQVtZQbZa0yO7kTIn59X/exec'; // Se llenará con el Apps Script URL

let currentRole = '';
let currentNav = 'dashboard';
let currentPeriod = 'hoy';

// ── LOCAL DATA (en memoria, se sincroniza con Sheets) ──
let data = {
  entradas: [],
  ventas: [],
  gastos: [],
  clientes: []
};

// ── ROLE SELECTION ───────────────────────────────────────────────────────
function selectRole(role) {
  if (role === 'admin') {
    document.getElementById('pwd-wrap').style.display = 'block';
    document.getElementById('pwd-input').focus();
    document.getElementById('pwd-error').style.display = 'none';
  } else {
    currentRole = 'vendedor';
    enterApp();
  }
}

function chkPwd() {
  const v = document.getElementById('pwd-input').value;
  if (v === ADMIN_PWD) {
    currentRole = 'admin';
    enterApp();
  } else {
    document.getElementById('pwd-error').style.display = 'block';
  }
}

function enterApp() {
  document.getElementById('splash').style.display = 'none';
  const app = document.getElementById('app');
  app.style.display = 'flex';
  document.getElementById('role-badge').textContent = currentRole === 'admin' ? '👑 Admin' : '🧾 Vendedor';

  // Ocultar tabs de admin si es vendedor
  if (currentRole !== 'admin') {
    document.querySelectorAll('.nav-entradas,.nav-gastos').forEach(el => el.style.display = 'none');
  }

  loadData();
  navTo('dashboard', document.querySelector('.nav-item'));
}

function logout() {
  currentRole = '';
  document.getElementById('app').style.display = 'none';
  document.getElementById('splash').style.display = 'flex';
  document.getElementById('pwd-input').value = '';
  document.getElementById('pwd-wrap').style.display = 'none';
}

// ── NAVIGATION ───────────────────────────────────────────────────────────
function navTo(section, el) {
  currentNav = section;
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  if (el) el.classList.add('active');
  render();
}

// ── DATA LAYER ───────────────────────────────────────────────────────────
function today() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function parseDate(d) {
  if (!d) return null;
  const s = String(d).trim();
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return new Date(s + 'T12:00:00');
  if (/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(s)) {
    const p = s.split('/');
    return new Date(p[2] + '-' + p[0].padStart(2,'0') + '-' + p[1].padStart(2,'0') + 'T12:00:00');
  }
  if (!isNaN(d) && Number(d) > 40000) {
    return new Date(new Date(1899,11,30).getTime() + Number(d)*86400000);
  }
  const dt = new Date(s);
  return isNaN(dt) ? null : dt;
}

function toYMD(d) {
  const dt = parseDate(d);
  if (!dt) return '';
  return dt.getFullYear() + '-' + String(dt.getMonth()+1).padStart(2,'0') + '-' + String(dt.getDate()).padStart(2,'0');
}

function fmtDate(d) {
  const dt = parseDate(d);
  if (!dt) return '—';
  return dt.toLocaleDateString('es-MX', { day: '2-digit', month: 'short', year: 'numeric' });
}

function fmtMoney(n) {
  return '$' + Number(n || 0).toLocaleString('es-MX', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function filterByPeriod(items, field) {
  const now = new Date();
  const todayStr = today();
  return items.filter(i => {
    const ymd = toYMD(i[field]);
    if (!ymd) return false;
    if (currentPeriod === 'hoy') return ymd === todayStr;
    const d = parseDate(ymd);
    if (currentPeriod === 'semana') { const diff = (now - d)/86400000; return diff >= 0 && diff < 7; }
    if (currentPeriod === 'mes') return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
    return true;
  });
}

// ── SHEETS SYNC ──────────────────────────────────────────────────────────
async function loadData() {
  if (!SHEETS_URL) {
    // Demo data
    data.clientes = [
      { id: 'C001', nombre: 'Frutería La Esperanza', tipo: 'fruteria', telefono: '8110001111' },
      { id: 'C002', nombre: 'Frutería El Paraíso', tipo: 'fruteria', telefono: '8112223333' },
      { id: 'C003', nombre: 'Don Memo', tipo: 'mayoreo', telefono: '8114445555' }
    ];
    render();
    return;
  }
  try {
    const r = await fetch(SHEETS_URL + '?action=getAll');
    const d2 = await r.json();
    if (d2.entradas) data.entradas = d2.entradas;
    if (d2.ventas) data.ventas = d2.ventas;
    if (d2.gastos) data.gastos = d2.gastos;
    if (d2.clientes) data.clientes = d2.clientes;
    render();
  } catch (e) { render(); }
}

async function saveToSheets(sheet, row) {
  if (!SHEETS_URL) return true;
  try {
    await fetch(SHEETS_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'add', sheet, row })
    });
    return true;
  } catch (e) { return false; }
}

// ── RENDER ───────────────────────────────────────────────────────────────
function render() {
  const c = document.getElementById('main-content');
  if (currentNav === 'dashboard') c.innerHTML = renderDashboard();
  else if (currentNav === 'ventas') c.innerHTML = renderVentas();
  else if (currentNav === 'entradas') c.innerHTML = renderEntradas();
  else if (currentNav === 'gastos') c.innerHTML = renderGastos();
  else if (currentNav === 'clientes') c.innerHTML = renderClientes();
  attachEvents();
}

// ── DASHBOARD ────────────────────────────────────────────────────────────
function renderDashboard() {
  const ventasHoy = filterByPeriod(data.ventas, 'fecha');
  const gastosHoy = filterByPeriod(data.gastos, 'fecha');
  const entradasHoy = filterByPeriod(data.entradas, 'fecha');

  const ingresoHoy = ventasHoy.reduce((s, v) => s + Number(v.total || 0), 0);
  const gastoHoy = gastosHoy.reduce((s, g) => s + Number(g.monto || 0), 0);
  const utilidad = ingresoHoy - gastoHoy;
  const efectivoHoy = ventasHoy.filter(v => v.pago !== 'transferencia').reduce((s, v) => s + Number(v.total || 0), 0);
  const transferHoy = ventasHoy.filter(v => v.pago === 'transferencia').reduce((s, v) => s + Number(v.total || 0), 0);

  // Inventario: tapas disponibles
  const tapasEntradas = data.entradas.reduce((s, e) => s + Number(e.tapas || 0), 0);
  const tapasVendidas = data.ventas.reduce((s, v) => s + Number(v.tapas || 0), 0);
  const tapasDisp = tapasEntradas - tapasVendidas;
  const cajasDisp = Math.floor(tapasDisp / 12);

  // Punto de equilibrio (total histórico)
  const inversionTotal = data.entradas.reduce((s, e) => s + Number(e.total || 0), 0)
                       + data.gastos.reduce((s, g) => s + Number(g.monto || 0), 0);
  const recuperado = data.ventas.reduce((s, v) => s + Number(v.total || 0), 0);
  const falta = Math.max(0, inversionTotal - recuperado);
  const progreso = inversionTotal > 0 ? Math.min(100, Math.round((recuperado / inversionTotal) * 100)) : 0;
  const enEquilibrio = recuperado >= inversionTotal;

  // Calcular precio promedio por tapa para estimar tapas que faltan
  const precioPromTapa = data.ventas.length > 0
    ? data.ventas.reduce((s, v) => s + Number(v.precio_tapa || 0), 0) / data.ventas.length
    : 0;
  const tapasFaltantes = precioPromTapa > 0 ? Math.ceil(falta / precioPromTapa) : 0;
  const cajasFaltantes = Math.ceil(tapasFaltantes / 12);

  const labels = ['hoy', 'semana', 'mes', 'total'];
  const labelText = { hoy: 'Hoy', semana: 'Esta semana', mes: 'Este mes', total: 'Todo' };

  return `
  <div class="period-wrap">
    ${labels.map(p => `<div class="period-pill ${currentPeriod === p ? 'active' : ''}" onclick="setPeriod('${p}')">${labelText[p]}</div>`).join('')}
  </div>

  <div class="dash-grid">
    <div class="stat-card accent">
      <div class="stat-label">Ingresos</div>
      <div class="stat-value">${fmtMoney(ingresoHoy)}</div>
      <div class="stat-sub">${ventasHoy.length} venta${ventasHoy.length !== 1 ? 's' : ''}</div>
    </div>
    <div class="stat-card success">
      <div class="stat-label">Utilidad</div>
      <div class="stat-value" style="font-size:20px">${fmtMoney(utilidad)}</div>
      <div class="stat-sub">gastos: ${fmtMoney(gastoHoy)}</div>
    </div>
  </div>

  <!-- PUNTO DE EQUILIBRIO -->
  <div class="card" style="margin-bottom:12px;">
    <div class="card-title"><span class="ct-icon">🎯</span>Punto de equilibrio</div>
    <div style="display:flex;justify-content:space-between;margin-bottom:10px;">
      <div>
        <div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;">Invertido</div>
        <div style="font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:var(--danger)">${fmtMoney(inversionTotal)}</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;">Recuperado</div>
        <div style="font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:var(--success)">${fmtMoney(recuperado)}</div>
      </div>
    </div>
    <div style="background:var(--border);border-radius:99px;height:10px;overflow:hidden;margin-bottom:8px;">
      <div style="height:100%;width:${progreso}%;background:${enEquilibrio ? 'var(--success)' : 'var(--accent)'};border-radius:99px;transition:width .5s;"></div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <div style="font-size:13px;color:var(--text-muted)">${progreso}% recuperado</div>
      ${enEquilibrio
        ? `<div style="font-size:13px;font-weight:700;color:var(--success)">✅ ¡En equilibrio!</div>`
        : `<div style="font-size:12px;color:var(--text-muted)">Faltan <b style="color:var(--accent)">${fmtMoney(falta)}</b></div>`
      }
    </div>
    ${!enEquilibrio && tapasFaltantes > 0 ? `
    <div style="margin-top:10px;background:var(--accent-bg);border-radius:var(--radius-sm);padding:10px 12px;display:flex;align-items:center;gap:8px;">
      <span style="font-size:20px;">🥚</span>
      <div style="font-size:13px;color:var(--accent)">Meta: vender <b>${tapasFaltantes} tapas</b> más (~${cajasFaltantes} caja${cajasFaltantes !== 1 ? 's' : ''}) al precio promedio actual</div>
    </div>` : ''}
  </div>

  <div class="card" style="margin-bottom:12px;">
    <div class="card-title"><span class="ct-icon">💳</span>Cobrado por forma de pago</div>
    <div style="display:flex;gap:10px;">
      <div style="flex:1;background:var(--surface2);border-radius:var(--radius-sm);padding:12px;text-align:center;">
        <div style="font-size:20px;margin-bottom:4px;">💵</div>
        <div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;">Efectivo</div>
        <div style="font-family:'Playfair Display',serif;font-size:19px;font-weight:700;color:var(--accent2)">${fmtMoney(efectivoHoy)}</div>
      </div>
      <div style="flex:1;background:var(--success-bg);border-radius:var(--radius-sm);padding:12px;text-align:center;">
        <div style="font-size:20px;margin-bottom:4px;">🏦</div>
        <div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;">Transferencia</div>
        <div style="font-family:'Playfair Display',serif;font-size:19px;font-weight:700;color:var(--success)">${fmtMoney(transferHoy)}</div>
      </div>
    </div>
  </div>

  <div class="dash-grid">
    <div class="stat-card">
      <div class="stat-label">Inventario</div>
      <div class="stat-value">${tapasDisp}</div>
      <div class="stat-sub">tapas · ${cajasDisp} cajas</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Clientes</div>
      <div class="stat-value">${data.clientes.length}</div>
      <div class="stat-sub">registrados</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title"><span class="ct-icon">🥚</span>Últimas ventas</div>
    ${data.ventas.slice(-5).reverse().map(v => `
      <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);">
        <div>
          <div style="font-weight:600;font-size:14px">${v.cliente}</div>
          <div style="font-size:12px;color:var(--text-muted)">${v.tapas} tapas · ${fmtDate(v.fecha)}</div>
        </div>
        <div style="font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--accent)">${fmtMoney(v.total)}</div>
      </div>
    `).join('') || '<div class="empty"><div class="empty-icon">🥚</div><div class="empty-text">Sin ventas aún</div></div>'}
  </div>

  ${currentRole === 'admin' ? `
  <div class="card">
    <div class="card-title"><span class="ct-icon">💸</span>Últimos gastos</div>
    ${data.gastos.slice(-4).reverse().map(g => `
      <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);">
        <div>
          <div style="font-weight:600;font-size:14px">${g.concepto}</div>
          <div style="font-size:12px;color:var(--text-muted)">${g.categoria} · ${fmtDate(g.fecha)}</div>
        </div>
        <div style="font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--danger)">${fmtMoney(g.monto)}</div>
      </div>
    `).join('') || '<div class="empty"><div class="empty-icon">💸</div><div class="empty-text">Sin gastos aún</div></div>'}
  </div>` : ''}
  `;
}

function setPeriod(p) {
  currentPeriod = p;
  render();
}

// ── VENTAS ───────────────────────────────────────────────────────────────
function renderVentas() {
  const lista = [...data.ventas].reverse();
  return `
  <div class="sec-header">
    <div class="sec-title">Ventas</div>
    <button class="sec-btn" onclick="openVentaModal()">+ Nueva</button>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="filterVentaTab(this,'todas')">Todas</div>
    <div class="tab" onclick="filterVentaTab(this,'fruteria')">Fruterías</div>
    <div class="tab" onclick="filterVentaTab(this,'mayoreo')">Mayoreo</div>
    <div class="tab" onclick="filterVentaTab(this,'menudeo')">Menudeo</div>
  </div>

  <div id="ventas-list">
    ${lista.length === 0 ? '<div class="empty"><div class="empty-icon">🥚</div><div class="empty-text">Sin ventas registradas</div></div>' :
    lista.map((v, i) => {
      const realIdx = data.ventas.length - 1 - i;
      return `
      <div class="list-item" data-tipo="${v.tipo || ''}">
        <div class="li-head">
          <div>
            <div class="li-title">${v.cliente}</div>
            <div class="li-meta">
              <span>${fmtDate(v.fecha)}</span>
              <span class="badge ${v.tipo === 'fruteria' ? 'badge-orange' : v.tipo === 'mayoreo' ? 'badge-green' : 'badge-gray'}">${v.tipo || 'menudeo'}</span>
            </div>
          </div>
          <div class="li-amount">${fmtMoney(v.total)}</div>
        </div>
        <div class="li-meta">
          <span>📦 ${v.cajas || 0} caja${v.cajas != 1 ? 's' : ''}</span>
          <span>🥚 ${v.tapas} tapas</span>
          <span>💰 ${fmtMoney(v.precio_tapa)}/tapa</span>
          <span class="badge ${v.pago === 'transferencia' ? 'badge-green' : 'badge-yellow'}">${v.pago === 'transferencia' ? '🏦 Transfer' : '💵 Efectivo'}</span>
        </div>
        <div style="margin-top:8px;display:flex;gap:6px;">
          <button onclick="verTicket(${realIdx})" style="flex:1;padding:7px;background:var(--info-bg);color:var(--info);border:1px solid #b0c8e8;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;">🧾 Ticket</button>
          <button onclick="editVenta(${realIdx})" style="flex:1;padding:7px;background:var(--surface2);color:var(--text-muted);border:1px solid var(--border);border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;">✏️ Editar</button>
          <button onclick="deleteVenta(${realIdx})" style="flex:1;padding:7px;background:var(--danger-bg);color:var(--danger);border:1px solid #e8b0b0;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;">🗑️</button>
        </div>
      </div>
    `}).join('')}
  </div>
  `;
}

function filterVentaTab(el, tipo) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('#ventas-list .list-item').forEach(item => {
    if (tipo === 'todas' || item.dataset.tipo === tipo) item.style.display = '';
    else item.style.display = 'none';
  });
}

function openVentaModal() {
  const opts = data.clientes.map(c => `<option value="${c.nombre}" data-tipo="${c.tipo}">${c.nombre}</option>`).join('');
  showModal(`
    <div class="modal-title">🥚 Nueva Venta</div>
    <div class="form-group">
      <label class="form-label">Fecha</label>
      <input class="form-input" type="date" id="v-fecha" value="${today()}"/>
    </div>
    <div class="form-group">
      <label class="form-label">Cliente</label>
      <select class="form-select" id="v-cliente" onchange="updateVentaTipo()">
        <option value="">— Selecciona —</option>
        ${opts}
        <option value="__nuevo__">+ Nuevo cliente rápido</option>
      </select>
    </div>
    <div class="form-group" id="v-tipo-wrap">
      <label class="form-label">Tipo</label>
      <select class="form-select" id="v-tipo">
        <option value="menudeo">Menudeo</option>
        <option value="mayoreo">Mayoreo</option>
        <option value="fruteria">Frutería</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Unidad de venta</label>
      <select class="form-select" id="v-unidad" onchange="calcVenta()">
        <option value="tapas">Tapas (30 huevos)</option>
        <option value="cajas">Cajas (12 tapas)</option>
      </select>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Cantidad</label>
        <input class="form-input" type="number" id="v-cant" min="1" value="1" oninput="calcVenta()"/>
      </div>
      <div class="form-group">
        <label class="form-label">Precio / tapa</label>
        <input class="form-input" type="number" id="v-precio" min="0" step="0.5" placeholder="0.00" oninput="calcVenta()"/>
      </div>
    </div>
    <div class="calc-box" id="v-calc" style="display:none">
      <div class="calc-row"><span>Tapas</span><span id="vc-tapas">—</span></div>
      <div class="calc-row"><span>Huevos</span><span id="vc-huevos">—</span></div>
      <div class="calc-row total"><span>Total</span><span id="vc-total">—</span></div>
    </div>
    <div class="form-group">
      <label class="form-label">Forma de pago</label>
      <div style="display:flex;gap:8px;">
        <label style="flex:1;display:flex;align-items:center;gap:8px;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;background:var(--surface);transition:all .2s;" id="lbl-efectivo">
          <input type="radio" name="v-pago" value="efectivo" id="v-pago-ef" onchange="selectPago('efectivo')" style="accent-color:var(--accent)"/> 💵 Efectivo
        </label>
        <label style="flex:1;display:flex;align-items:center;gap:8px;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;background:var(--surface);transition:all .2s;" id="lbl-transferencia">
          <input type="radio" name="v-pago" value="transferencia" id="v-pago-tr" onchange="selectPago('transferencia')" style="accent-color:var(--accent)"/> 🏦 Transferencia
        </label>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Nota (opcional)</label>
      <textarea class="form-textarea" id="v-nota" placeholder="Ej: entrega a domicilio, crédito..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveVenta()">Guardar</button>
    </div>
  `);
}

function updateVentaTipo() {
  const sel = document.getElementById('v-cliente');
  const opt = sel.options[sel.selectedIndex];
  if (opt && opt.dataset.tipo) {
    document.getElementById('v-tipo').value = opt.dataset.tipo;
  }
  if (sel.value === '__nuevo__') openNuevoClienteRapido();
}

function calcVenta() {
  const unidad = document.getElementById('v-unidad').value;
  const cant = Number(document.getElementById('v-cant').value) || 0;
  const precio = Number(document.getElementById('v-precio').value) || 0;
  let tapas = unidad === 'cajas' ? cant * 12 : cant;
  const total = tapas * precio;
  document.getElementById('v-calc').style.display = 'block';
  document.getElementById('vc-tapas').textContent = tapas;
  document.getElementById('vc-huevos').textContent = tapas * 30;
  document.getElementById('vc-total').textContent = fmtMoney(total);
}

function selectPago(tipo) {
  document.getElementById('lbl-efectivo').style.borderColor = tipo === 'efectivo' ? 'var(--accent)' : 'var(--border)';
  document.getElementById('lbl-efectivo').style.background = tipo === 'efectivo' ? 'var(--accent-bg)' : 'var(--surface)';
  document.getElementById('lbl-transferencia').style.borderColor = tipo === 'transferencia' ? 'var(--accent)' : 'var(--border)';
  document.getElementById('lbl-transferencia').style.background = tipo === 'transferencia' ? 'var(--accent-bg)' : 'var(--surface)';
}

async function saveVenta() {
  const cliente = document.getElementById('v-cliente').value;
  const tipo = document.getElementById('v-tipo').value;
  const unidad = document.getElementById('v-unidad').value;
  const cant = Number(document.getElementById('v-cant').value) || 0;
  const precio = Number(document.getElementById('v-precio').value) || 0;
  const fecha = document.getElementById('v-fecha').value;
  const nota = document.getElementById('v-nota').value;
  const pagoEl = document.querySelector('input[name="v-pago"]:checked');
  const pago = pagoEl ? pagoEl.value : '';
  if (!cliente || !cant || !precio || !fecha || !pago) { showToast('⚠️ Completa todos los campos y forma de pago'); return; }
  const tapas = unidad === 'cajas' ? cant * 12 : cant;
  const cajas = unidad === 'cajas' ? cant : (cant / 12).toFixed(2);
  const total = tapas * precio;
  const v = { fecha, cliente, tipo, unidad, cant, tapas, cajas, precio_tapa: precio, total, nota, pago, id: Date.now().toString() };
  data.ventas.push(v);
  closeModal();
  render();
  showToast('✅ Venta guardada');
  await saveToSheets('Ventas', v);
}

function verTicket(idx) {
  const v = data.ventas[idx];
  if (!v) return;
  showModal(`
    <div class="modal-title">🧾 Ticket de Venta</div>
    <div class="ticket">
      <div class="ticket-header">
        <div class="ticket-brand">🐔 La Gallina Regia</div>
        <div class="ticket-sub">Huevo Rojo de Calidad</div>
        <div style="font-size:12px;color:var(--text-faint);margin-top:6px">${fmtDate(v.fecha)}</div>
      </div>
      <div class="ticket-row"><span>Cliente</span><span><b>${v.cliente}</b></span></div>
      <div class="ticket-row"><span>Tapas (30 h)</span><span>${v.tapas}</span></div>
      <div class="ticket-row"><span>Cajas</span><span>${v.cajas}</span></div>
      <div class="ticket-row"><span>Precio / tapa</span><span>${fmtMoney(v.precio_tapa)}</span></div>
      ${v.nota ? `<div class="ticket-row"><span>Nota</span><span style="text-align:right;max-width:60%">${v.nota}</span></div>` : ''}
      <div class="ticket-row"><span>Forma de pago</span><span>${v.pago === 'transferencia' ? '🏦 Transferencia' : '💵 Efectivo'}</span></div>
      <div class="ticket-row bold"><span>TOTAL</span><span>${fmtMoney(v.total)}</span></div>
      <div class="ticket-footer">¡Gracias por su compra! 🥚</div>
    </div>
    <div class="modal-actions" style="margin-top:14px">
      <button class="btn btn-secondary" onclick="closeModal()">Cerrar</button>
      <button class="btn btn-primary" onclick="compartirTicket(${idx})">📤 Compartir</button>
    </div>
  `);
}

function compartirTicket(idx) {
  const v = data.ventas[idx];
  const txt = `🐔 *La Gallina Regia*\n🥚 Huevo Rojo de Calidad\n\n📅 ${fmtDate(v.fecha)}\n👤 Cliente: ${v.cliente}\n📦 Tapas: ${v.tapas} (${v.cajas} cajas)\n💰 Precio/tapa: ${fmtMoney(v.precio_tapa)}\n${v.nota ? '📝 Nota: ' + v.nota + '\n' : ''}\n*TOTAL: ${fmtMoney(v.total)}*\n\n¡Gracias por su compra! 🐔`;
  if (navigator.share) {
    navigator.share({ title: 'Ticket La Gallina Regia', text: txt });
  } else {
    navigator.clipboard.writeText(txt).then(() => showToast('📋 Copiado al portapapeles'));
  }
}

    <div class="calc-box" id="v-calc">

    <div class="form-group">
      <label class="form-label">Forma de pago</label>

    return `

  }).join('');

function filterClientes(q) {
  document.querySelectorAll('#clientes-list .list-item').forEach(el => {

  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

  document.querySelectorAll('#clientes-list .list-item').forEach(item => {
    item.style.display = (tipo === 'todos' || item.dataset.tipo === tipo) ? '' : 'none';
  });
}

  const sel = document.getElementById('v-cliente');
  const opt = document.createElement('option');
  opt.value = c.nombre;
  opt.textContent = c.nombre;
  opt.dataset.tipo = c.tipo;
  sel.insertBefore(opt, sel.lastElementChild);
  sel.value = c.nombre;
}

async function saveCliente() {
  const nombre = document.getElementById('c-nombre').value.trim();
  const tel = document.getElementById('c-tel').value.trim();
  const tipo = document.getElementById('c-tipo').value;
  if (!nombre) { showToast('⚠️ Ingresa el nombre'); return; }
  const c = { id: 'C' + Date.now(), nombre, telefono: tel, tipo };
  data.clientes.push(c);
  closeModal();
  render();
  showToast('✅ Cliente guardado');
  await saveToSheets('Clientes', c);
}

// ── MODAL ─────────────────────────────────────────────────────────────────
function showModal(html) {
  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.remove('open');
}

// ── TOAST ─────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.opacity = '1';
  setTimeout(() => t.style.opacity = '0', 2800);
}

// ── ATTACH EVENTS ─────────────────────────────────────────────────────────
function attachEvents() {}

// INIT
window.addEventListener('load', () => {
  // Check URL params para vendedor directo
  const p = new URLSearchParams(location.search);
  if (p.get('rol') === 'vendedor') {
    currentRole = 'vendedor';
    enterApp();
  }
});
</script>
